<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carta Markah 6 Al-Khawarizmi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap');
        body { font-family: 'Space Grotesk', sans-serif; background-color: #0f172a; }
        
        /* Kesan Kotak Menyala (Neon Glow) untuk Top 3 */
        .gold-box { background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%); box-shadow: 0 0 20px rgba(245, 158, 11, 0.3); }
        .silver-box { background: linear-gradient(135deg, #94a3b8 0%, #475569 100%); box-shadow: 0 0 20px rgba(148, 163, 184, 0.2); }
        .bronze-box { background: linear-gradient(135deg, #b45309 0%, #78350f 100%); box-shadow: 0 0 20px rgba(180, 83, 9, 0.2); }
    </style>
</head>
<body class="text-slate-100 min-h-screen pb-12">

    <!-- Header Sekolah -->
    <div class="bg-slate-900 border-b border-slate-800 text-center py-6 px-4 mb-8">
        <h1 class="text-3xl font-extrabold tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-indigo-500 uppercase">SRAR AL-KAUTHAR</h1>
        <p class="text-slate-400 text-sm mt-1">Carta Markah Kelas 6 Al-Khawarizmi</p>
    </div>

    <div class="max-w-3xl mx-auto px-4">
        
        <!-- Borang Tambah Murid (Sentiasa Terbuka untuk Semua) -->
        <div class="bg-slate-900 border border-slate-800 p-5 rounded-2xl mb-8">
            <h3 class="text-cyan-400 font-bold mb-3 flex items-center gap-2"><i class="fas fa-user-plus"></i> Tambah Murid Baru</h3>
            <div class="flex flex-col sm:flex-row gap-3">
                <input type="text" id="newStudentName" placeholder="Nama penuh murid..." class="flex-1 bg-slate-800 border border-slate-700 rounded-xl px-4 py-2 text-sm text-slate-100 focus:outline-none focus:border-cyan-500">
                <input type="number" id="newStudentScore" placeholder="Markah" class="w-full sm:w-28 bg-slate-800 border border-slate-700 rounded-xl px-4 py-2 text-sm text-slate-100 focus:outline-none focus:border-cyan-500">
                <button onclick="addStudent()" class="bg-cyan-500 hover:bg-cyan-600 text-slate-950 text-sm font-bold px-6 py-2 rounded-xl transition-colors shadow-lg">Tambah</button>
            </div>
        </div>

        <!-- Ruangan Paparan Kad Murid -->
        <div id="leaderboardContainer" class="space-y-4">
            <!-- Kad akan disusun secara automatik di sini -->
        </div>

    </div>

    <script>
        // Data Contoh Awal (Boleh dipadam/ditukar terus nanti)
        const defaultStudents = [
            { id: 1, name: "Ahmad Mujahid", score: 95 },
            { id: 2, name: "Siti Nurhaliza", score: 92 },
            { id: 3, name: "Muhammad Faiz", score: 88 },
            { id: 4, name: "Khairul Anuar", score: 80 },
            { id: 5, name: "Nurul Izzah", score: 75 }
        ];

        // Sistem Auto-Save Peranti (localStorage)
        let students = JSON.parse(localStorage.getItem('local_dark_leaderboard')) || defaultStudents;

        function saveAndRender() {
            // Auto-Save ke dalam pelayar komputer ini sahaja
            localStorage.setItem('local_dark_leaderboard', JSON.stringify(students));
            
            // Susun kedudukan dari markah tertinggi ke terendah
            students.sort((a, b) => b.score - a.score);

            const container = document.getElementById('leaderboardContainer');
            container.innerHTML = '';

            students.forEach((student, index) => {
                const rank = index + 1;
                
                let boxClass = "bg-slate-900 border border-slate-800 text-slate-100";
                let badgeClass = "bg-slate-800 text-slate-400 font-bold";
                let textClass = "text-slate-200";
                let scoreClass = "text-cyan-400";
                let medal = "";

                // Kesan Khas Warna Kotak Ikut Urutan 1, 2, 3 dari Atas
                if (rank === 1) {
                    boxClass = "gold-box text-amber-950";
                    badgeClass = "bg-amber-950 text-amber-300 font-black";
                    textClass = "text-slate-950 font-bold text-lg";
                    scoreClass = "text-slate-950 font-black";
                    medal = "🥇 ";
                } else if (rank === 2) {
                    boxClass = "silver-box text-slate-900";
                    badgeClass = "bg-slate-950 text-slate-300 font-black";
                    textClass = "text-slate-950 font-bold";
                    scoreClass = "text-slate-950 font-black";
                    medal = "🥈 ";
                } else if (rank === 3) {
                    boxClass = "bronze-box text-orange-950";
                    badgeClass = "bg-orange-950 text-orange-300 font-black";
                    textClass = "text-slate-950 font-bold";
                    scoreClass = "text-slate-950 font-black";
                    medal = "🥉 ";
                }

                const card = document.createElement('div');
                card.className = `${boxClass} p-4 rounded-xl flex items-center justify-between shadow-md transition-all duration-300 transform hover:scale-[1.01]`;
                
                card.innerHTML = `
                    <div class="flex items-center gap-4">
                        <span class="${badgeClass} w-8 h-8 rounded-full flex items-center justify-center text-sm shadow-inner">
                            ${rank}
                        </span>
                        <span class="${textClass} text-sm md:text-base">${medal}${student.name}</span>
                    </div>
                    <div class="flex items-center gap-4">
                        <span class="text-2xl font-black ${scoreClass}">${student.score}</span>
                        <div class="flex items-center gap-1">
                            <button onclick="updateScore(${student.id}, 1)" class="bg-black/20 hover:bg-black/30 text-current w-8 h-8 rounded-lg text-xs transition-colors"><i class="fas fa-plus"></i></button>
                            <button onclick="updateScore(${student.id}, -1)" class="bg-black/10 hover:bg-black/20 text-current w-8 h-8 rounded-lg text-xs transition-colors"><i class="fas fa-minus"></i></button>
                            <button onclick="deleteStudent(${student.id})" class="bg-rose-600/20 hover:bg-rose-600 hover:text-white text-rose-400 w-8 h-8 rounded-lg text-xs transition-colors ml-2"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // Fungsi Tambah/Tolak Markah (Kini +1 dan -1)
        function updateScore(id, amount) {
            const student = students.find(s => s.id === id);
            if (student) {
                student.score += amount;
                if (student.score < 0) student.score = 0;
                saveAndRender();
            }
        }

        // Fungsi Tambah Murid Baru
        function addStudent() {
            const nameInput = document.getElementById('newStudentName');
            const scoreInput = document.getElementById('newStudentScore');
            
            if (nameInput.value.trim() === '') {
                alert('Sila masukkan nama murid!');
                return;
            }

            const newStudent = {
                id: Date.now(),
                name: nameInput.value.trim(),
                score: parseInt(scoreInput.value) || 0
            };

            students.push(newStudent);
            nameInput.value = '';
            scoreInput.value = '';
            saveAndRender();
        }

        // Fungsi Padam Murid
        function deleteStudent(id) {
            if (confirm("Padam murid ini dari carta?")) {
                students = students.filter(s => s.id !== id);
                saveAndRender();
            }
        }

        // Papar senarai utama semasa bermula
        saveAndRender();
    </script>
</body>
</html>
